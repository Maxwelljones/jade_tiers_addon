name: Build KidZ Jade Tiers Addon

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14

      - name: Show project files
        run: |
          pwd
          ls -la
          find . -maxdepth 5 -type f | sort

      - name: Build addon
        run: |
          gradle build --no-daemon --stacktrace --info 2>&1 | tee gradle-build.log

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: warn

      - name: Upload built jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kidz-jade-tiers-addon
          path: build/libs/*.jar
          if-no-files-found: error
