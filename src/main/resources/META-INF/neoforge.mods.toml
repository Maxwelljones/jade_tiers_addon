modLoader="javafml"
loaderVersion="[2,)"
license="MIT"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="MaxwellJoneZ"
displayTest="IGNORE_SERVER_VERSION"
description='''Adds a Jade tooltip line showing the required Silent Gear mining tier for blocks. Display only; does not change mining logic.'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neoforge_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="jade"
type="required"
versionRange="[15.0.0,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="silentgear"
type="required"
versionRange="[4.2.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="silentlib"
type="required"
versionRange="[10.6.0,)"
ordering="AFTER"
side="BOTH"
